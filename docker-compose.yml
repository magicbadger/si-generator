services:
  si-generator:
    build: .
    ports:
      - "8080:80"
    restart: unless-stopped

  dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./app:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm ci && npm run dev"
    restart: unless-stopped
